<!DOCTYPE html>
<html>
<head>
    <title>Report Issue</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">

<h2>DurbanFix</h2>
<h4 class="mb-4">Report Issue</h4>

<!-- Messages -->
{% if messages %}
    {% for message in messages %}
        <div class="alert alert-warning">{{ message }}</div>
    {% endfor %}
{% endif %}

<form method="POST" class="card p-4 shadow">
    {% csrf_token %}

    <div class="mb-3">
        <label class="form-label">Select Issue:</label>
        <select name="issue_type" class="form-control">
            <option value="">-- Select Issue --</option>
            <option value="water">Water Leak</option>
            <option value="electricity">Electricity Fault</option>
            <option value="roads">Road Damage</option>
        </select>
    </div>

    <div class="mb-3">
        <label class="form-label">Location:</label>
        <input type="text" name="location" class="form-control" placeholder="Enter Address">
    </div>

    <div class="mb-3">
        <label class="form-label">Description:</label>
        <textarea name="description" class="form-control" placeholder="Describe the problem..."></textarea>
    </div>

    <button class="btn btn-success w-100">Submit Report</button>
</form>

</body>
</html>
